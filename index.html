<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>배송 누락 체크</title>
  <style>
    :root {
      color-scheme: light;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #0f172a;
      background: #eff4ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
      color: #0f172a;
      line-height: 1.6;
    }
    .page {
      width: min(1024px, calc(100% - 40px));
      margin: 0 auto;
      padding: 44px 0 56px;
    }
    header {
      margin-bottom: 32px;
      padding: 32px;
      border-radius: 32px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(148,163,184,0.2);
      box-shadow: 0 24px 80px rgba(15,23,42,0.08);
    }
    .title-group {
      display: grid;
      gap: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(59,130,246,0.12);
      color: #1d4ed8;
      font-size: 0.95rem;
      font-weight: 700;
      width: fit-content;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.2rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }
    p.description {
      margin: 0;
      max-width: 760px;
      color: #475569;
      font-size: 1rem;
    }
    .panel {
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 32px;
      padding: 36px;
      box-shadow: 0 24px 75px rgba(15, 23, 42, 0.08);
    }
    .panel + .panel { margin-top: 28px; }
    .panel-grid {
      display: grid;
      gap: 32px;
    }
    .form-row {
      display: grid;
      gap: 24px;
      grid-template-columns: 1fr 1fr;
    }
    .form-row.full { grid-template-columns: 1fr; }
    .form-item {
      display: grid;
      gap: 12px;
    }
    label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1f2937;
    }
    .field {
      width: 100%;
      min-height: 56px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid #d1d5db;
      background: #f8fafc;
      color: #0f172a;
      font-size: 1rem;
    }
    .field:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
      background: #ffffff;
    }
    .file-box {
      display: grid;
      gap: 14px;
    }
    .file-box label:first-child {
      font-size: 0.95rem;
      color: #475569;
      font-weight: 700;
    }
    .file-select {
      width: 100%;
      min-height: 70px;
      padding: 0 22px;
      border-radius: 26px;
      border: 1px solid rgba(148,163,184,0.35);
      background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: #1e293b;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .file-select:hover {
      transform: translateY(-1px);
      border-color: #3b82f6;
      box-shadow: 0 16px 28px rgba(59,130,246,0.14);
    }
    .file-select span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.94;
      font-size: 1rem;
      font-weight: 600;
    }
    input[type=file] {
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px;
      border-radius: 24px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
    .toggle-row label {
      margin: 0;
      cursor: pointer;
      color: #334155;
      font-weight: 700;
    }
    .toggle-row input {
      width: 20px;
      height: 20px;
      accent-color: #2563eb;
    }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: flex-start;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 56px;
      padding: 0 26px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 18px 40px rgba(37,99,235,0.26); }
    .btn-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .download-link {
      min-height: 56px;
      padding: 0 24px;
      border-radius: 18px;
      border: 1px solid rgba(100,116,139,0.22);
      background: #ffffff;
      color: #334155;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .download-link:hover { transform: translateY(-1px); border-color: #3b82f6; }
    .help-text {
      margin: 0;
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .summary-card {
      display: grid;
      gap: 24px;
    }
    .summary-inner {
      display: grid;
      gap: 16px;
    }
    .summary-heading {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
    }
    .summary-label {
      margin: 0;
      color: #475569;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .summary-text {
      margin: 0;
      color: #334155;
      font-size: 1rem;
      line-height: 1.6;
    }
    .summary-meta {
      padding: 28px 30px;
      border-radius: 28px;
      background: #ffffff;
      border: 1px solid rgba(148,163,184,0.18);
      color: #0f172a;
      font-size: 1.05rem;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
    }
    .summary-meta strong {
      color: #2563eb;
    }
    .row-remove {
      appearance: none;
      border: 1px solid rgba(148,163,184,0.35);
      border-radius: 14px;
      padding: 10px 14px;
      background: #ffffff;
      color: #dc2626;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .row-remove:hover {
      transform: translateY(-1px);
      background: #fef2f2;
    }
    .table-wrap {
      overflow-x: auto;
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(15,23,42,0.08);
      background: #ffffff;
      padding: 2px;
    }
    table {
      width: 100%;
      border-spacing: 0;
      min-width: 780px;
      background: #ffffff;
    }
    thead {
      background: #eff6ff;
    }
    th, td {
      padding: 18px 20px;
      text-align: left;
      color: #0f172a;
    }
    th {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    td {
      border-top: 1px solid rgba(148,163,184,0.16);
      font-size: 0.95rem;
    }
    tr:hover td { background: #f8fafc; }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .page { width: min(100%, calc(100% - 24px)); }
      .form-row { grid-template-columns: 1fr; }
      .action-row { flex-direction: column; align-items: stretch; }
      .file-select { flex-direction: column; align-items: flex-start; gap: 10px; }
      .download-link { width: 100%; }
      .table-wrap { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="title-group">
        <span class="badge">배송 체크 도구</span>
        <h1>배송 누락 / 미스캔 체크</h1>
        <p class="description">EasyAdmin 엑셀을 업로드하면 지정한 판매처와 옵션을 제외하고, 음수 재고를 필터링한 결과를 즉시 볼 수 있습니다.</p>
      </div>
    </header>

    <section class="panel">
      <div class="panel-grid">
        <div class="file-box">
          <label for="fileInput">EasyAdmin 엑셀 파일</label>
          <label for="fileInput" class="file-select">
            <span>파일 선택</span>
            <span id="fileLabel">선택된 파일 없음</span>
          </label>
          <input type="file" id="fileInput" accept=".xls,.xlsx" />
        </div>

        <div class="form-row full">
          <div class="form-item">
            <label for="excludeSellers">제외할 판매처 키워드</label>
            <input class="field" type="text" id="excludeSellers" value="쿠팡,B2B,B2C" placeholder="쉼표로 구분하여 입력하세요" />
          </div>
          <div class="form-item">
            <label for="excludeOptions">판매처 옵션 제외 키워드</label>
            <input class="field" type="text" id="excludeOptions" value="순차출고,예약출고,예약,출고" placeholder="쉼표로 구분하여 입력하세요" />
          </div>
        </div>

        <div class="toggle-row">
          <input type="checkbox" id="skipNegative" checked />
          <label for="skipNegative">가용재고 음수 행 제외</label>
        </div>

        <div class="action-row">
          <button id="runButton" class="btn-primary">필터 실행</button>
        </div>
      </div>
      <p class="help-text">웹에서 직접 파일을 분석하고 필터링합니다. 서버 업로드 없이 브라우저에서 바로 처리됩니다.</p>
    </section>

    <section class="panel summary-card">
      <div class="summary-inner">
        <div class="summary-heading">
          <p class="summary-label">결과 요약</p>
          <a id="downloadLink" class="download-link hidden" download="filtered_delivery_missing.csv">CSV 다운로드</a>
        </div>
        <div class="summary-meta">
          <p id="summaryText" class="summary-text">엑셀 파일을 업로드하고 필터 실행 버튼을 눌러 주세요.</p>
          <p class="summary-text">총 <strong id="resultCount">0</strong>개 행이 필터링되었습니다.</p>
        </div>
      </div>
      <div class="table-wrap">
        <div id="tableContainer"></div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.getElementById('fileLabel');
    const runButton = document.getElementById('runButton');
    const summaryText = document.getElementById('summaryText');
    const tableContainer = document.getElementById('tableContainer');
    const downloadLink = document.getElementById('downloadLink');
    const excludeSellersInput = document.getElementById('excludeSellers');
    const excludeOptionsInput = document.getElementById('excludeOptions');
    const skipNegativeInput = document.getElementById('skipNegative');

    const headers = ['주문번호','상품명','옵션명','상품수량','가용재고','송장번호','배송일'];
    let activeRows = [];

    fileInput.addEventListener('change', () => {
      fileLabel.textContent = fileInput.files?.[0]?.name || '선택된 파일 없음';
    });

    function createCSV(rows) {
      const escapeValue = v => '"' + String(v || '').replace(/"/g, '""') + '"';
      const bom = '\uFEFF';
      const lines = [headers.map(escapeValue).join(',')].concat(rows.map(row => headers.map(field => escapeValue(row[field])).join(',')));
      return bom + lines.join('\r\n');
    }

    function renderSummary(rows) {
      activeRows = rows.slice();
      if (!activeRows.length) {
        summaryText.textContent = '조건에 맞는 결과가 없습니다.';
        tableContainer.innerHTML = '';
        downloadLink.classList.add('hidden');
        document.getElementById('resultCount').textContent = '0';
        return;
      }
      summaryText.textContent = `총 ${activeRows.length}개 행이 필터링되었습니다. 아래는 최대 50개 결과입니다.`;
      const sliced = activeRows.slice(0, 50);
      const th = '<th>삭제</th>' + headers.map(h => `<th>${h}</th>`).join('');
      const tr = sliced.map((row, index) => {
        const rowIndex = index;
        const cells = headers.map(field => `<td>${String(row[field] || '')}</td>`).join('');
        return `<tr><td><button type="button" class="row-remove" data-row-index="${rowIndex}">삭제</button></td>${cells}</tr>`;
      }).join('');
      tableContainer.innerHTML = `<table><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
      tableContainer.querySelectorAll('.row-remove').forEach(button => {
        button.addEventListener('click', () => {
          const removeIndex = Number(button.dataset.rowIndex);
          activeRows.splice(removeIndex, 1);
          renderSummary(activeRows);
        });
      });
      const csv = createCSV(activeRows);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      downloadLink.href = URL.createObjectURL(blob);
      downloadLink.classList.remove('hidden');
      document.getElementById('resultCount').textContent = activeRows.length;
    }

    function filterRows(rows) {
      if (rows.length === 0) return [];
      const headerRow = rows[0].map(cell => String(cell || '').trim());
      const indexOf = name => headerRow.findIndex(h => h === name);
      const idxSeller = indexOf('판매처');
      const idxStock = indexOf('가용재고');
      const idxSellerOption = indexOf('판매처 옵션');
      const idxOrder = indexOf('주문번호');
      const idxProduct = indexOf('상품명');
      const idxOption = indexOf('옵션명');
      const idxQty = indexOf('상품수량');
      const idxTracking = indexOf('송장번호');
      const idxDate = indexOf('배송일');

      const sellers = excludeSellersInput.value.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
      const options = excludeOptionsInput.value.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
      const skipNegative = skipNegativeInput.checked;

      const out = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const seller = idxSeller !== -1 ? String(row[idxSeller] || '').toLowerCase() : '';
        const stock = idxStock !== -1 ? String(row[idxStock] || '') : '';
        const sellerOption = idxSellerOption !== -1 ? String(row[idxSellerOption] || '').toLowerCase() : '';

        if (sellers.some(keyword => keyword && seller.includes(keyword))) continue;
        if (skipNegative) {
          const num = parseFloat(String(stock).replace(/[^0-9.-]/g, ''));
          if (!Number.isNaN(num) && num < 0) continue;
        }
        if (options.some(keyword => keyword && sellerOption.includes(keyword))) continue;

        out.push({
          주문번호: idxOrder !== -1 ? row[idxOrder] || '' : '',
          상품명: idxProduct !== -1 ? row[idxProduct] || '' : '',
          옵션명: idxOption !== -1 ? row[idxOption] || '' : '',
          상품수량: idxQty !== -1 ? row[idxQty] || '' : '',
          가용재고: idxStock !== -1 ? row[idxStock] || '' : '',
          송장번호: idxTracking !== -1 ? row[idxTracking] || '' : '',
          배송일: idxDate !== -1 ? row[idxDate] || '' : ''
        });
      }
      return out;
    }

    async function runFilter() {
      const file = fileInput.files?.[0];
      if (!file) {
        alert('엑셀 파일을 선택해 주세요.');
        return;
      }
      runButton.disabled = true;
      runButton.textContent = '처리 중...';
      summaryText.textContent = '처리 중입니다...';
      tableContainer.innerHTML = '';
      downloadLink.classList.add('hidden');

      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data, { type: 'array', cellDates: true });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      const filtered = filterRows(rows);
      renderSummary(filtered);
      runButton.disabled = false;
      runButton.textContent = '필터 실행';
      if (!document.getElementById('resultCount').textContent) {
        document.getElementById('resultCount').textContent = '0';
      }
    }

    runButton.addEventListener('click', runFilter);
  </script>
</body>
</html>
