<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>배송 누락 체크</title>
  <style>
    :root {
      color-scheme: light;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #111827;
      background: #f3f4f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: #111827;
    }
    .page {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }
    .title-group {
      max-width: 720px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 3vw, 2.8rem);
      line-height: 1.05;
    }
    p.description {
      margin: 0;
      color: #4b5563;
      font-size: 1rem;
      line-height: 1.75;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(99,102,241,.12);
      color: #4f46e5;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .panel {
      background: #ffffff;
      border: 1px solid rgba(148,163,184,.16);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      padding: 28px;
    }
    .panel + .panel {
      margin-top: 24px;
    }
    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(12, minmax(0, 1fr));
    }
    .col-span-8 { grid-column: span 8 / span 8; }
    .col-span-4 { grid-column: span 4 / span 4; }
    .full { grid-column: 1 / -1; }
    label {
      display: block;
      margin-bottom: 12px;
      color: #1f2937;
      font-size: 0.95rem;
      font-weight: 700;
    }
    input[type=file] {
      opacity: 0;
      position: absolute;
      z-index: -1;
    }
    .file-picker {
      position: relative;
      display: grid;
      gap: 10px;
    }
    .file-picker button {
      width: 100%;
      display: inline-flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .file-picker button:hover { border-color: #6366f1; transform: translateY(-1px); }
    .file-picker span {
      display: inline-block;
      color: #4b5563;
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    input[type=text] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      background: #f8fafc;
      font-size: 1rem;
      color: #111827;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input[type=text]:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.08);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
    }
    .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #374151;
      font-weight: 600;
    }
    input[type=checkbox] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 22px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #4f46e5, #2563eb);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 18px 30px rgba(79,70,229,0.2); }
    .download-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      color: #374151;
      background: #ffffff;
      text-decoration: none;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .download-link:hover { border-color: #6366f1; transform: translateY(-1px); }
    .help-text {
      margin-top: 12px;
      color: #6b7280;
      font-size: 0.95rem;
      line-height: 1.7;
    }
    .summary-card {
      display: grid;
      gap: 20px;
    }
    .summary-card h2 {
      margin: 0;
      font-size: 1.2rem;
      color: #111827;
    }
    .info-box {
      padding: 20px;
      border-radius: 20px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #475569;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(15,23,42,0.06);
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      color: #111827;
    }
    th {
      background: #eef2ff;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 0.97rem;
    }
    tr:nth-child(even) td { background: #f8fafc; }
    td { border-bottom: 1px solid rgba(148,163,184,0.16); font-size: 0.95rem; }
    .hidden { display: none !important; }
    @media (max-width: 960px) {
      .grid { grid-template-columns: 1fr; }
      .col-span-8, .col-span-4 { grid-column: 1 / -1; }
      .controls { flex-direction: column; align-items: stretch; }
      .download-link { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="title-group">
        <span class="badge">배송 체크 도구</span>
        <h1>배송 누락 / 미스캔 체크</h1>
        <p class="description">EasyAdmin 엑셀을 업로드하면 지정한 판매처와 옵션을 제외하고, 음수 재고를 필터링한 결과를 즉시 볼 수 있습니다.</p>
      </div>
    </header>

    <section class="panel">
      <div class="grid">
        <div class="full file-picker">
          <label for="fileInput">EasyAdmin 엑셀 파일</label>
          <label for="fileInput" class="btn-primary" style="justify-content: space-between;">
            <span>파일 선택</span>
            <span id="fileLabel">선택된 파일 없음</span>
          </label>
          <input type="file" id="fileInput" accept=".xls,.xlsx" />
        </div>

        <div class="col-span-6">
          <label for="excludeSellers">제외할 판매처 키워드</label>
          <input type="text" id="excludeSellers" value="쿠팡,B2B,B2C" placeholder="쉼표로 구분하여 입력하세요" />
        </div>

        <div class="col-span-6">
          <label for="excludeOptions">판매처 옵션 제외 키워드</label>
          <input type="text" id="excludeOptions" value="순차출고,예약출고,예약,출고" placeholder="쉼표로 구분하여 입력하세요" />
        </div>

        <div class="col-span-8">
          <label class="checkbox-label"><input type="checkbox" id="skipNegative" checked />가용재고 음수 행 제외</label>
        </div>

        <div class="col-span-4 controls">
          <button id="runButton" class="btn-primary">필터 실행</button>
          <a id="downloadLink" class="download-link hidden" download="filtered_delivery_missing.csv">CSV 다운로드</a>
        </div>
      </div>
      <p class="help-text">웹에서 직접 파일을 분석하고 필터링합니다. 서버 업로드 없이 브라우저에서 바로 처리됩니다.</p>
    </section>

    <section class="panel summary-card">
      <div>
        <h2>요약</h2>
        <div id="summaryText" class="info-box">파일을 선택하고 실행 버튼을 누르세요.</div>
      </div>
      <div id="tableContainer"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.getElementById('fileLabel');
    const runButton = document.getElementById('runButton');
    const summaryText = document.getElementById('summaryText');
    const tableContainer = document.getElementById('tableContainer');
    const downloadLink = document.getElementById('downloadLink');
    const excludeSellersInput = document.getElementById('excludeSellers');
    const excludeOptionsInput = document.getElementById('excludeOptions');
    const skipNegativeInput = document.getElementById('skipNegative');

    const headers = ['주문번호','상품명','옵션명','상품수량','가용재고','송장번호','배송일'];

    fileInput.addEventListener('change', () => {
      fileLabel.textContent = fileInput.files?.[0]?.name || '선택된 파일 없음';
    });

    function createCSV(rows) {
      const escapeValue = v => '"' + String(v || '').replace(/"/g, '""') + '"';
      return [headers.map(escapeValue).join(',')].concat(rows.map(row => headers.map(field => escapeValue(row[field])).join(','))).join('\n');
    }

    function renderSummary(rows) {
      if (!rows.length) {
        summaryText.textContent = '조건에 맞는 결과가 없습니다.';
        tableContainer.innerHTML = '';
        downloadLink.classList.add('hidden');
        return;
      }
      summaryText.textContent = `총 ${rows.length}개 행이 필터링되었습니다. 아래는 최대 50개 결과입니다.`;
      const sliced = rows.slice(0, 50);
      const th = headers.map(h => `<th>${h}</th>`).join('');
      const tr = sliced.map(row => '<tr>' + headers.map(field => `<td>${String(row[field] || '')}</td>`).join('') + '</tr>').join('');
      tableContainer.innerHTML = `<table><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
      const csv = createCSV(rows);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      downloadLink.href = URL.createObjectURL(blob);
      downloadLink.classList.remove('hidden');
    }

    function filterRows(rows) {
      if (rows.length === 0) return [];
      const headerRow = rows[0].map(cell => String(cell || '').trim());
      const indexOf = name => headerRow.findIndex(h => h === name);
      const idxSeller = indexOf('판매처');
      const idxStock = indexOf('가용재고');
      const idxSellerOption = indexOf('판매처 옵션');
      const idxOrder = indexOf('주문번호');
      const idxProduct = indexOf('상품명');
      const idxOption = indexOf('옵션명');
      const idxQty = indexOf('상품수량');
      const idxTracking = indexOf('송장번호');
      const idxDate = indexOf('배송일');

      const sellers = excludeSellersInput.value.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
      const options = excludeOptionsInput.value.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
      const skipNegative = skipNegativeInput.checked;

      const out = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const seller = idxSeller !== -1 ? String(row[idxSeller] || '').toLowerCase() : '';
        const stock = idxStock !== -1 ? String(row[idxStock] || '') : '';
        const sellerOption = idxSellerOption !== -1 ? String(row[idxSellerOption] || '').toLowerCase() : '';

        if (sellers.some(keyword => keyword && seller.includes(keyword))) continue;
        if (skipNegative) {
          const num = parseFloat(String(stock).replace(/[^0-9.-]/g, ''));
          if (!Number.isNaN(num) && num < 0) continue;
        }
        if (options.some(keyword => keyword && sellerOption.includes(keyword))) continue;

        out.push({
          주문번호: idxOrder !== -1 ? row[idxOrder] || '' : '',
          상품명: idxProduct !== -1 ? row[idxProduct] || '' : '',
          옵션명: idxOption !== -1 ? row[idxOption] || '' : '',
          상품수량: idxQty !== -1 ? row[idxQty] || '' : '',
          가용재고: idxStock !== -1 ? row[idxStock] || '' : '',
          송장번호: idxTracking !== -1 ? row[idxTracking] || '' : '',
          배송일: idxDate !== -1 ? row[idxDate] || '' : ''
        });
      }
      return out;
    }

    async function runFilter() {
      const file = fileInput.files?.[0];
      if (!file) {
        alert('엑셀 파일을 선택해 주세요.');
        return;
      }
      runButton.disabled = true;
      runButton.textContent = '처리 중...';
      summaryText.textContent = '처리 중입니다...';
      tableContainer.innerHTML = '';
      downloadLink.classList.add('hidden');

      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data, { type: 'array', cellDates: true });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      const filtered = filterRows(rows);
      renderSummary(filtered);
      runButton.disabled = false;
      runButton.textContent = '필터 실행';
    }

    runButton.addEventListener('click', runFilter);
  </script>
</body>
</html>
